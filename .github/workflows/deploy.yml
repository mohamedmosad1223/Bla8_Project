name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # سحب الكود الجديد
            cd /var/www/Bla8_Project/Bla8_Project-main
            git pull

            # بناء الـ Frontend
            cd website/client
            npm install
            npx vite build

            # إعادة تشغيل الـ Backend
            systemctl restart balagh-backend

            # التأكد من الـ Docker
            cd /var/www/Bla8_Project/Bla8_Project-main/website/docker
            docker compose up -d

            echo "✅ Deploy تم بنجاح!"