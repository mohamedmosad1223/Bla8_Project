<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Test Login - Muslim Caller</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f4ff; }
    .box { background: #fff; border-radius: 16px; padding: 2rem; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); text-align: center; }
    h2 { color: #1e4d8c; margin-bottom: 1rem; }
    button { width: 100%; padding: 0.9rem; border: none; border-radius: 50px; cursor: pointer; font-size: 1rem; font-weight: bold; margin: 0.5rem 0; }
    .btn-muslim { background: #1e4d8c; color: #fff; }
    .btn-org { background: #666; color: #fff; }
    .btn-preacher { background: #dba841; color: #fff; }
    p { color: #666; font-size: 0.85rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🔧 Test Role Switcher</h2>
    <p>اختر الدور وهيتم تحويلك للداشبورد المناسبة</p>
    <br/>
    <button class="btn-muslim" onclick="login('muslim_caller')">مسلم يدعو الناس للإسلام</button>
    <button class="btn-preacher" onclick="login('preacher')">داعية إسلامي</button>
    <button class="btn-org" onclick="login('organization')">جمعية إسلامية / أدمن</button>
    <p>يفتح على localhost:5173</p>
  </div>
  <script>
    function login(role) {
      localStorage.setItem('userRole', role);
      localStorage.setItem('userData', JSON.stringify({ name: 'Test User', email: 'test@test.com' }));
      window.location.href = 'http://localhost:5173/dashboard';
    }
  </script>
</body>
</html>
